  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevConf 2026</title>
    <link rel="stylesheet" href="./styles/style.css" />
    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
